# Prometheus configuration for Daddy-config Verification Service

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert_rules.yml"

scrape_configs:
  - job_name: "daddy-config-backend"
    static_configs:
      - targets: ["localhost:3000"]
    metrics_path: "/metrics"
    scrape_interval: 10s

  - job_name: "daddy-config-api"
    static_configs:
      - targets: ["localhost:3001"]
    metrics_path: "/metrics"
    scrape_interval: 10s
