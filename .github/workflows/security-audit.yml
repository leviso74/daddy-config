name: Security Audit

on:
  push:
    branches: [main]
    paths:
      - '**/package.json'
      - '**/package-lock.json'
      - '**/pnpm-lock.yaml'
      - '.github/workflows/security-audit.yml'
  pull_request:
    branches: [main]
    paths:
      - '**/package.json'
      - '**/package-lock.json'
      - '**/pnpm-lock.yaml'
      - '.github/workflows/security-audit.yml'
  schedule:
    - cron: '0 6 * * 1'

jobs:
  npm-audit:
    name: npm audit (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - backend
          - frontend
          - api
          - examples

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check package-lock.json exists
        id: check-lock
        run: |
          if [ -f "${{ matrix.service }}/package-lock.json" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          elif [ -f "${{ matrix.service }}/pnpm-lock.yaml" ]; then
            echo "exists=pnpm" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies (npm)
        if: steps.check-lock.outputs.exists == 'true'
        working-directory: ${{ matrix.service }}
        run: npm ci --ignore-scripts

      - name: Install pnpm
        if: steps.check-lock.outputs.exists == 'pnpm'
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies (pnpm)
        if: steps.check-lock.outputs.exists == 'pnpm'
        working-directory: ${{ matrix.service }}
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Run npm audit (high/critical only)
        if: steps.check-lock.outputs.exists == 'true'
        working-directory: ${{ matrix.service }}
        run: npm audit --audit-level=high --json | tee npm-audit-${{ matrix.service }}.json; npm audit --audit-level=high
        continue-on-error: false

      - name: Run pnpm audit (high/critical only)
        if: steps.check-lock.outputs.exists == 'pnpm'
        working-directory: ${{ matrix.service }}
        run: pnpm audit --audit-level=high
        continue-on-error: false

      - name: Upload audit report
        if: always() && steps.check-lock.outputs.exists != 'false'
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-${{ matrix.service }}
          path: ${{ matrix.service }}/npm-audit-${{ matrix.service }}.json
          retention-days: 14

  rust-audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        run: cargo audit

  security-summary:
    name: Security Audit Summary
    runs-on: ubuntu-latest
    needs: [npm-audit, rust-audit]
    if: always()
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.npm-audit.result }}" == "failure" || "${{ needs.rust-audit.result }}" == "failure" ]]; then
            echo "❌ Security audit failed — high or critical CVEs detected"
            exit 1
          fi
          echo "✅ No high or critical vulnerabilities found"
