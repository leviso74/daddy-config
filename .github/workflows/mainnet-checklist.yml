name: Mainnet Deployment Checklist

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── 1. WASM build ──────────────────────────────────────────────────────────
  wasm-build:
    name: WASM build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-wasm-

      - name: Build WASM target
        run: cargo build --release --target wasm32-unknown-unknown

      - name: Verify WASM artifact exists
        run: |
          WASM_FILE="target/wasm32-unknown-unknown/release/daddy-config.wasm"
          if [ ! -f "$WASM_FILE" ]; then
            echo "❌ WASM artifact not found at $WASM_FILE"
            exit 1
          fi
          SIZE=$(wc -c < "$WASM_FILE")
          echo "✅ WASM artifact built successfully (${SIZE} bytes)"

  # ── 2. Full test suite ─────────────────────────────────────────────────────
  contract-tests:
    name: Contract test suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run full test suite
        run: cargo test --verbose 2>&1 | tee test-output.txt
        continue-on-error: false

      - name: Summarise test results
        if: always()
        run: |
          echo "### Contract test results" >> $GITHUB_STEP_SUMMARY
          grep -E "^(test .* (ok|FAILED|ignored)|test result)" test-output.txt >> $GITHUB_STEP_SUMMARY || true

  # ── 3. No TODO/FIXME in security-critical files ────────────────────────────
  security-lint:
    name: No TODO/FIXME in security-critical files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Scan security-critical files for TODO/FIXME
        run: |
          set +e
          SECURITY_PATHS=(
            "src/validation.rs"
            "src/abuse_protection.rs"
            "src/rate_limit.rs"
            "src/multisig.rs"
            "src/governance.rs"
            "backend/src/sanitizer.ts"
            "backend/src/transfer-guard.ts"
            "backend/src/webhook-middleware.ts"
          )
          FOUND=0
          for path in "${SECURITY_PATHS[@]}"; do
            if [ -f "$path" ]; then
              MATCHES=$(grep -nE "TODO|FIXME" "$path" || true)
              if [ -n "$MATCHES" ]; then
                echo "❌ TODO/FIXME found in $path:"
                echo "$MATCHES"
                FOUND=1
              fi
            fi
          done
          if [ "$FOUND" -eq 1 ]; then
            echo ""
            echo "Resolve all TODO/FIXME items in security-critical files before mainnet deployment."
            exit 1
          fi
          echo "✅ No TODO/FIXME markers found in security-critical files"

  # ── 4. CHANGELOG updated ───────────────────────────────────────────────────
  changelog-check:
    name: CHANGELOG updated
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Verify CHANGELOG.md was updated
        run: |
          # Check if CHANGELOG.md has been modified relative to main
          BASE="${{ github.event.pull_request.base.sha }}"
          if [ -z "$BASE" ]; then
            # workflow_dispatch — compare to HEAD~1
            BASE="HEAD~1"
          fi

          if git diff --name-only "$BASE"...HEAD | grep -q "^CHANGELOG\.md$"; then
            echo "✅ CHANGELOG.md updated in this branch"
          else
            echo "❌ CHANGELOG.md has not been updated."
            echo "Update CHANGELOG.md with a summary of changes before mainnet deployment."
            exit 1
          fi

  # ── 5. Clippy (no warnings) ────────────────────────────────────────────────
  clippy-strict:
    name: Clippy (deny warnings)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run clippy
        run: cargo clippy -- -D warnings

  # ── Summary gate ───────────────────────────────────────────────────────────
  mainnet-checklist:
    name: Mainnet Checklist
    runs-on: ubuntu-latest
    needs:
      - wasm-build
      - contract-tests
      - security-lint
      - changelog-check
      - clippy-strict
    if: always()
    steps:
      - name: Evaluate checklist results
        run: |
          results="${{ join(needs.*.result, ' ') }}"
          FAILED=0
          for r in $results; do
            if [[ "$r" == "failure" || "$r" == "cancelled" ]]; then
              FAILED=1
            fi
          done

          echo "## Mainnet Deployment Checklist" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| WASM build | ${{ needs.wasm-build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Contract tests | ${{ needs.contract-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security lint (no TODO/FIXME) | ${{ needs.security-lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| CHANGELOG updated | ${{ needs.changelog-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Clippy strict | ${{ needs.clippy-strict.result }} |" >> $GITHUB_STEP_SUMMARY

          if [ "$FAILED" -eq 1 ]; then
            echo "❌ Mainnet checklist FAILED — deployment is blocked" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          echo "✅ Mainnet checklist PASSED — deployment may proceed" >> $GITHUB_STEP_SUMMARY
