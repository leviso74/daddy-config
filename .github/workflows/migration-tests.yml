name: Database Migration Tests

on:
  push:
    branches: [main, "feat/**"]
    paths:
      - "backend/migrations/**"
      - "backend/src/migrate.ts"
      - ".github/workflows/migration-tests.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/migrations/**"
      - "backend/src/migrate.ts"
      - ".github/workflows/migration-tests.yml"

defaults:
  run:
    working-directory: backend

jobs:
  migration-up:
    name: Run all migrations from scratch
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: swiftremit_migration_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - name: Run all migrations (up)
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/swiftremit_migration_test
        run: npm run migrate

      - name: Verify schema_migrations table is populated
        env:
          PGPASSWORD: postgres
        run: |
          count=$(psql -h localhost -U postgres -d swiftremit_migration_test \
            -tAc "SELECT COUNT(*) FROM schema_migrations WHERE failed = false")
          echo "Applied migrations: $count"
          if [ "$count" -eq "0" ]; then
            echo "ERROR: No migrations were applied"
            exit 1
          fi

      - name: Verify core tables exist
        env:
          PGPASSWORD: postgres
        run: |
          # Verify a representative set of tables that must exist after all
          # migrations run from scratch.
          for table in schema_migrations remittances anchors kyc_status webhooks admin_audit_log; do
            exists=$(psql -h localhost -U postgres -d swiftremit_migration_test \
              -tAc "SELECT EXISTS (
                SELECT 1 FROM information_schema.tables
                WHERE table_schema = 'public' AND table_name = '$table'
              )")
            echo "Table '$table': exists=$exists"
            if [ "$exists" != "t" ]; then
              echo "ERROR: Expected table '$table' not found after running all migrations"
              exit 1
            fi
          done

  migration-rollback:
    name: Rollback most-recent migration
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: migration-up

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: swiftremit_rollback_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - name: Apply all migrations
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/swiftremit_rollback_test
        run: npm run migrate

      - name: Record migration count before rollback
        id: before
        env:
          PGPASSWORD: postgres
        run: |
          count=$(psql -h localhost -U postgres -d swiftremit_rollback_test \
            -tAc "SELECT COUNT(*) FROM schema_migrations WHERE failed = false")
          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "Migrations before rollback: $count"

      - name: Roll back most-recent migration
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/swiftremit_rollback_test
        run: npm run migrate:rollback

      - name: Verify one migration was removed
        env:
          PGPASSWORD: postgres
        run: |
          before=${{ steps.before.outputs.count }}
          after=$(psql -h localhost -U postgres -d swiftremit_rollback_test \
            -tAc "SELECT COUNT(*) FROM schema_migrations WHERE failed = false")
          echo "Migrations after rollback: $after (was $before)"
          expected=$((before - 1))
          if [ "$after" -ne "$expected" ]; then
            echo "ERROR: Expected $expected migrations after rollback, got $after"
            exit 1
          fi

      - name: Re-apply after rollback (idempotency check)
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/swiftremit_rollback_test
        run: npm run migrate
