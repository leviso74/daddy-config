name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write
  # Required for npm provenance signing via OIDC
  id-token: write
  # Required for changesets to open version-bump PRs
  pull-requests: write

jobs:
  # ── Changesets: version bump PR or automatic npm publish on merge to main ──────
  changesets:
    name: Changesets release
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    outputs:
      published: ${{ steps.changesets.outputs.published }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use a PAT or the default GITHUB_TOKEN so changesets can push commits/PRs
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install SDK dependencies
        working-directory: sdk
        run: npm ci

      - name: Build SDK
        working-directory: sdk
        run: npm run build

      - name: Run changesets action
        id: changesets
        uses: changesets/action@v1
        with:
          # When a changeset is present this creates/updates a "Version Packages" PR.
          # When that PR is merged, this step publishes to npm automatically.
          publish: npm run release --workspace=sdk
          version: npx changeset version
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"

  # ── Tag-based release: manual semver tags publish and attach contract artifact ──
  release:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Verify CHANGELOG entry
        run: |
          if ! grep -q "## \[${{ steps.version.outputs.VERSION }}\]" CHANGELOG.md; then
            echo "Error: No CHANGELOG entry found for version ${{ steps.version.outputs.VERSION }}"
            exit 1
          fi

      - name: Install SDK dependencies
        working-directory: sdk
        run: npm ci

      - name: Build SDK
        working-directory: sdk
        run: npm run build

      - name: Update SDK package version
        working-directory: sdk
        run: npm version ${{ steps.version.outputs.VERSION }} --no-git-tag-version

      - name: Publish SDK to npm
        working-directory: sdk
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Generate release notes
        id: release_notes
        run: |
          gh release create ${{ github.ref_name }} \
            --title "Release ${{ steps.version.outputs.VERSION }}" \
            --generate-notes \
            --verify-tag
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          CHANGELOG=$(awk "/## \[$VERSION\]/,/## \[/" CHANGELOG.md | sed '$d' | tail -n +2)
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Update release with changelog
        run: |
          gh release edit ${{ github.ref_name }} \
            --notes "${{ steps.changelog.outputs.CHANGELOG }}"
        env:
          GH_TOKEN: ${{ github.token }}

  build-artifacts:
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: wasm32-unknown-unknown

      - name: Install Soroban CLI
        run: |
          cargo install --locked soroban-cli --features opt

      - name: Build contract
        run: |
          cargo build --target wasm32-unknown-unknown --release
          soroban contract optimize \
            --wasm target/wasm32-unknown-unknown/release/swiftremit.wasm \
            --wasm-out swiftremit-optimized.wasm

      - name: Upload contract artifact
        run: |
          gh release upload ${{ github.ref_name }} \
            swiftremit-optimized.wasm \
            --clobber
        env:
          GH_TOKEN: ${{ github.token }}
