name: Contract Fuzz Tests

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'fuzz/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Seconds to fuzz each target"
        required: false
        default: "30"
        type: string

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fuzz:
    name: Fuzz ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - fuzz_validate_amount
          - fuzz_validate_corridor
          - fuzz_validate_recipient_hash

    steps:
      - uses: actions/checkout@v4

      - name: Install nightly toolchain
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            fuzz/target
          key: ${{ runner.os }}-fuzz-${{ matrix.target }}-${{ hashFiles('Cargo.lock', 'fuzz/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-fuzz-${{ matrix.target }}-

      - name: Install cargo-fuzz
        run: cargo +nightly install cargo-fuzz --locked

      - name: Run fuzz target for ${{ inputs.fuzz_duration || 30 }} seconds
        run: |
          DURATION="${{ inputs.fuzz_duration || 30 }}"
          cargo +nightly fuzz run "${{ matrix.target }}" \
            "fuzz/corpus/${{ matrix.target }}" \
            -- \
            -max_total_time="$DURATION" \
            -timeout=10 \
            -print_final_stats=1
        working-directory: ${{ github.workspace }}

      - name: Upload crash artifacts (if any)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crashes-${{ matrix.target }}
          path: |
            fuzz/artifacts/${{ matrix.target }}/
          retention-days: 30

      - name: Upload corpus additions
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-corpus-${{ matrix.target }}
          path: fuzz/corpus/${{ matrix.target }}/
          retention-days: 7
