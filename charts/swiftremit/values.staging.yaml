# values.staging.yaml — staging cluster overrides
# Usage: helm install daddy-config ./charts/daddy-config -f charts/daddy-config/values.staging.yaml
#
# Secrets with empty values MUST be injected at deploy time, e.g.:
#   helm upgrade --install daddy-config ./charts/daddy-config \
#     -f charts/daddy-config/values.staging.yaml \
#     --set api.secret.DATABASE_URL="$DATABASE_URL" \
#     --set backend.secret.DATABASE_URL="$DATABASE_URL" \
#     --set backend.secret.CONTRACT_ID="$CONTRACT_ID" \
#     --set backend.secret.ADMIN_SECRET_KEY="$ADMIN_SECRET_KEY"

global:
  imageRegistry: "ghcr.io/your-org"
  nodeEnv: staging

api:
  replicaCount: 2
  image:
    tag: staging
    pullPolicy: Always
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
  config:
    NODE_ENV: staging
  secret:
    DATABASE_URL: ""
    CONTRACT_RPC_URL: "https://soroban-testnet.stellar.org"
    ANCHORS_ADMIN_API_KEY: ""

backend:
  replicaCount: 2
  image:
    tag: staging
    pullPolicy: Always
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
  config:
    NODE_ENV: staging
    STELLAR_NETWORK: testnet
    HORIZON_URL: "https://horizon-testnet.stellar.org"
    SOROBAN_RPC_URL: "https://soroban-testnet.stellar.org"
    NETWORK_PASSPHRASE: "Test SDF Network ; September 2015"
  secret:
    DATABASE_URL: ""
    CONTRACT_ID: ""
    ADMIN_SECRET_KEY: ""

frontend:
  replicaCount: 2
  image:
    tag: staging
    pullPolicy: Always
  config:
    VITE_NETWORK: testnet
    VITE_HORIZON_URL: "https://horizon-testnet.stellar.org"
    VITE_SOROBAN_RPC_URL: "https://soroban-testnet.stellar.org"
    VITE_CONTRACT_ID: ""
    VITE_USDC_ISSUER: ""
    VITE_EURC_ISSUER: ""
    VITE_USDC_TOKEN_ID: ""

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-staging"
  hosts:
    - host: staging.daddy-config.example.com
      paths:
        - path: /api
          pathType: Prefix
          service: api
        - path: /backend
          pathType: Prefix
          service: backend
        - path: /
          pathType: Prefix
          service: frontend
  tls:
    - secretName: daddy-config-staging-tls
      hosts:
        - staging.daddy-config.example.com
